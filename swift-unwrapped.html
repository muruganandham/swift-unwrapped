<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift, Unwrapped — Learn Swift Visually</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #15161e;
  --bg-soft: #1b1c27;
  --surface: #20222f;
  --surface-2: #262838;
  --border: #34374a;
  --text: #e9e7e2;
  --text-dim: #9b9cae;
  --orange: #fa7343;
  --orange-dim: #c95a32;
  --mint: #6ee7b7;
  --violet: #b9a3ff;
  --rose: #ff8fa3;
  --radius: 10px;
}
*{box-sizing:border-box;}
html{ height:100%; }
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  height:100%;
  overflow:hidden;
}
.skip-link{position:absolute;left:-999px;}
.skip-link:focus{left:8px;top:8px;background:var(--orange);color:#15161e;padding:6px 10px;border-radius:6px;z-index:999;}

/* The scrim is a click-outside overlay for the mobile drawer. It must
   NEVER participate in .app's grid flow, on any screen size, or it
   silently eats a grid cell and pushes the sidebar/main out of place. */
.scrim{
  position:fixed; inset:0;
  background:rgba(0,0,0,.5);
  z-index:50;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}
.scrim.show{ opacity:1; pointer-events:auto; }

/* ---------- App shell ---------- */
.app{
  display:grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 100%;
  height:100%;
}
.sidebar{ grid-column: 1; }
.main{ grid-column: 2; }
@media (max-width: 860px){
  .app{ grid-template-columns: 1fr; }
  .sidebar{
    grid-column: 1;
    position:fixed; inset:0 30% 0 0; z-index:55;
    transform:translateX(-105%);
    transition: transform .28s ease;
    width:78vw; max-width:320px;
  }
  .sidebar.open{ transform:translateX(0); }
  .menu-toggle{display:inline-flex !important;}
}

/* ---------- Sidebar (outline) ---------- */
.sidebar{
  background: var(--bg-soft);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100%;
}
.brand{
  padding:22px 20px 16px;
  border-bottom:1px solid var(--border);
}
.brand .mark{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:21px;
  letter-spacing:-0.01em;
  display:flex; align-items:center; gap:9px;
}
.brand .mark .dot{
  width:9px;height:9px;border-radius:50%;
  background: var(--orange);
  box-shadow:0 0 0 3px rgba(250,115,67,.18);
}
.brand .tag{
  font-size:12px; color:var(--text-dim); margin-top:5px;
  font-family:'JetBrains Mono', monospace;
}
nav.outline{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:10px 10px 24px;
}
nav.outline::-webkit-scrollbar{width:8px;}
nav.outline::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:8px;}

.menu-group{ margin-bottom:2px; }
.menu-btn{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  background:none;
  border:none;
  color:var(--text);
  font-family:'Inter';
  font-size:14px;
  font-weight:600;
  padding:10px 10px;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
}
.menu-btn:hover{ background: var(--surface); }
.menu-btn .chev{
  margin-left:auto;
  transition: transform .2s ease;
  color: var(--text-dim);
  font-size:11px;
}
.menu-btn[aria-expanded="true"] .chev{ transform: rotate(90deg); color:var(--orange); }
.menu-btn .num{
  font-family:'JetBrains Mono';
  font-size:11px;
  color: var(--orange);
  width:20px;
  flex:none;
}
.submenu-list{
  list-style:none;
  margin:2px 0 8px 0;
  padding:0 0 0 30px;
  display:none;
  border-left:1px solid var(--border);
  margin-left:20px;
}
.submenu-list.open{ display:block; }
.submenu-list li{ margin:1px 0; }
.sub-btn{
  width:100%;
  background:none;
  border:none;
  color: var(--text-dim);
  font-size:13.5px;
  text-align:left;
  padding:8px 10px;
  border-radius:7px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  font-family:'Inter';
}
.sub-btn:hover{ background:var(--surface); color:var(--text); }
.sub-btn.active{
  background: rgba(250,115,67,.12);
  color: var(--orange);
  font-weight:600;
}
.sub-btn .pip{
  width:5px;height:5px;border-radius:50%;
  background: var(--text-dim);
  flex:none;
}
.sub-btn.active .pip{ background: var(--orange); }

.sidebar-footer{
  padding:12px 20px;
  border-top:1px solid var(--border);
  font-size:11.5px;
  color:var(--text-dim);
  font-family:'JetBrains Mono', monospace;
}

/* ---------- Main / details ---------- */
.main{
  height:100%;
  min-height:0;
  overflow-y:auto;
  position:relative;
}
.topbar{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; gap:12px;
  padding:14px 28px;
  background: linear-gradient(to bottom, var(--bg) 70%, transparent);
  backdrop-filter: blur(6px);
}
.menu-toggle{
  display:none;
  align-items:center; justify-content:center;
  width:34px;height:34px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  cursor:pointer;
  flex:none;
}
.crumbs{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  color:var(--text-dim);
}
.crumbs b{ color: var(--orange); font-weight:600; }

.content{
  max-width:780px;
  margin:0 auto;
  padding:18px 28px 90px;
}

/* ---------- Large screen scaling ---------- */
@media (min-width: 1100px){
  .app{ grid-template-columns: 320px 1fr; }
  .content{ max-width:860px; padding:32px 40px 110px; }
  .content h1{ font-size:44px; }
  .topbar{ padding:18px 40px; }
}
@media (min-width: 1500px){
  .app{ grid-template-columns: 340px 1fr; }
  .content{ max-width:920px; padding:44px 56px 130px; }
}
@media (min-width: 1900px){
  /* On ultra-wide screens, cap the whole app so the sidebar + content
     don't stretch into a thin strip with acres of empty page around it */
  body{ display:flex; justify-content:center; background: var(--bg-soft); }
  .app{ max-width:1760px; width:100%; box-shadow:0 0 0 1px var(--border); }
}
.eyebrow{
  font-family:'JetBrains Mono', monospace;
  color: var(--orange);
  font-size:12.5px;
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.content h1{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:38px;
  line-height:1.08;
  margin:0 0 14px;
  letter-spacing:-0.01em;
}
.lede{
  font-size:16.5px;
  color:#c8c6d8;
  line-height:1.65;
  margin:0 0 26px;
  max-width:640px;
}
.content h2{
  font-family:'Fraunces', serif;
  font-size:20px;
  font-weight:600;
  margin:34px 0 12px;
  color: var(--text);
}
.content p{
  font-size:15px;
  line-height:1.7;
  color:#c8c6d8;
  margin:0 0 14px;
}
.content code.inline{
  font-family:'JetBrains Mono', monospace;
  background: var(--surface-2);
  padding:2px 6px;
  border-radius:5px;
  font-size:13px;
  color: var(--mint);
}

/* code block */
.codeblock{
  background: #10111a;
  border:1px solid var(--border);
  border-radius: var(--radius);
  overflow:hidden;
  margin:16px 0 22px;
}
.codeblock .cb-head{
  display:flex; align-items:center; gap:8px;
  padding:9px 14px;
  border-bottom:1px solid var(--border);
  background: var(--surface);
}
.cb-head .dot2{ width:9px;height:9px;border-radius:50%; }
.cb-head .r{ background:#ff6166; } .cb-head .y{ background:#ffd75e; } .cb-head .g{ background:#52d273; }
.cb-head .fname{
  margin-left:6px;
  font-family:'JetBrains Mono', monospace;
  font-size:11.5px;
  color: var(--text-dim);
}
.codeblock pre{
  margin:0; padding:16px 18px;
  overflow-x:auto;
  font-family:'JetBrains Mono', monospace;
  font-size:13.5px;
  line-height:1.65;
}
.tk-kw{ color: var(--orange); }
.tk-type{ color: var(--violet); }
.tk-str{ color: var(--mint); }
.tk-com{ color: var(--text-dim); font-style:italic; }
.tk-num{ color: var(--rose); }
.tk-fn{ color: #7fb6ff; }

/* interactive panel */
.lab{
  border:1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  margin:18px 0 30px;
  overflow:hidden;
}
.lab-head{
  display:flex; align-items:center; gap:8px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background: var(--surface-2);
}
.lab-head .ic{ color: var(--mint); font-size:14px; }
.lab-head .lab-title{
  font-weight:600; font-size:13.5px;
  font-family:'Inter';
}
.lab-head .lab-hint{
  margin-left:auto;
  font-size:11.5px;
  color:var(--text-dim);
  font-family:'JetBrains Mono', monospace;
}
.lab-body{ padding:18px 18px 20px; }
.lab-controls{
  display:flex; flex-wrap:wrap; gap:10px 16px;
  margin-bottom:16px;
}
.ctl{
  display:flex; flex-direction:column; gap:6px;
}
.ctl label{
  font-size:11.5px; color:var(--text-dim);
  font-family:'JetBrains Mono', monospace;
  text-transform:uppercase; letter-spacing:.03em;
}
.ctl input[type="text"], .ctl input[type="number"], .ctl select{
  background: var(--bg-soft);
  border:1px solid var(--border);
  color: var(--text);
  padding:8px 10px;
  border-radius:7px;
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  min-width:120px;
}
.ctl input[type="range"]{ width:160px; accent-color: var(--orange); }
.seg{
  display:inline-flex;
  background: var(--bg-soft);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}
.seg button{
  border:none; background:none; color:var(--text-dim);
  padding:8px 14px; font-size:13px; cursor:pointer;
  font-family:'Inter'; font-weight:600;
}
.seg button.active{ background: var(--orange); color:#1a1106; }
.btn{
  background: var(--orange);
  color:#1a1106;
  border:none;
  padding:9px 16px;
  border-radius:7px;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  font-family:'Inter';
}
.btn.secondary{
  background: var(--surface-2);
  color: var(--text);
  border:1px solid var(--border);
}
.btn:active{ transform: translateY(1px); }
.console{
  background:#0d0e15;
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 16px;
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  min-height:54px;
  white-space:pre-wrap;
  line-height:1.6;
}
.console .arrow{ color: var(--text-dim); margin-right:8px;}
.console .ok{ color: var(--mint); }
.console .err{ color: var(--rose); }
.console .info{ color: var(--violet); }
.tape{
  display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;
}
.tape .cell{
  background: var(--bg-soft);
  border:1px solid var(--border);
  border-radius:7px;
  padding:7px 11px;
  font-family:'JetBrains Mono', monospace;
  font-size:12.5px;
  color: var(--text-dim);
  transition: all .15s;
}
.tape .cell.hit{
  border-color: var(--orange);
  color: var(--orange);
  background: rgba(250,115,67,.1);
}
.kv-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.pill{
  display:inline-block; padding:3px 9px; border-radius:20px;
  font-size:11px; font-family:'JetBrains Mono', monospace;
  background: var(--surface-2); color: var(--text-dim); border:1px solid var(--border);
}
.pill.mint{ color:var(--mint); border-color: rgba(110,231,183,.3); }
.pill.rose{ color:var(--rose); border-color: rgba(255,143,163,.3); }

.rule{
  display:flex; gap:12px; align-items:flex-start;
  background: var(--surface); border:1px solid var(--border); border-left:3px solid var(--violet);
  border-radius: var(--radius);
  padding:14px 16px; margin:18px 0;
}
.rule .rule-ic{
  font-family:'Fraunces', serif; font-weight:600; font-size:13px;
  color: var(--violet); white-space:nowrap; letter-spacing:.02em;
  padding-top:1px;
}
.rule p{ margin:0; }
.rule strong{ color: var(--text); }

.two-col{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media (max-width:620px){ .two-col{ grid-template-columns:1fr; } }
@media (min-width:1100px){
  .lab-body{ padding:22px 24px 24px; }
  .lab-controls{ gap:14px 22px; }
}
.box-card{
  border:1px solid var(--border); border-radius:9px; padding:14px;
  background: var(--bg-soft);
}
.box-card h4{
  margin:0 0 8px; font-size:12.5px; text-transform:uppercase; letter-spacing:.04em;
  font-family:'JetBrains Mono', monospace; color: var(--text-dim);
}
.box-card .val{ font-family:'JetBrains Mono', monospace; font-size:14px; color:var(--text); }

.nav-footer{
  display:flex; justify-content:space-between; gap:12px;
  margin-top:40px; padding-top:20px; border-top:1px solid var(--border);
}
.nf-link{
  display:flex; flex-direction:column; gap:3px;
  padding:12px 16px; border:1px solid var(--border); border-radius:9px;
  cursor:pointer; max-width:48%;
  background: var(--surface);
}
.nf-link:hover{ border-color: var(--orange); }
.nf-link .nf-dir{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono', monospace; }
.nf-link .nf-title{ font-size:13.5px; font-weight:600; }
.nf-link.next{ text-align:right; margin-left:auto; }
</style>
</head>
<body>
<a class="skip-link" href="#maincontent">Skip to content</a>

<div class="app" id="app">
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar" aria-label="Course outline">
    <div class="brand">
      <div class="mark"><span class="dot"></span> Swift, Unwrapped</div>
      <div class="tag">// learn Swift by poking at it</div>
    </div>
    <nav class="outline" id="outline"></nav>
    <div class="sidebar-footer">12 lessons · 6 chapters</div>
  </aside>

  <main class="main" id="maincontent">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Open outline">☰</button>
      <div class="crumbs" id="crumbs"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
/* ======================= CONTENT DATA ======================= */
const course = [
  {
    id:"basics", title:"The Basics", icon:"01",
    subs:[
      {id:"vars", title:"var vs let"},
      {id:"types", title:"Types & Inference"},
      {id:"optionals", title:"Optionals"},
      {id:"opsio", title:"Operators, I/O & Unwrapping"},
    ]
  },
  {
    id:"flow", title:"Control Flow", icon:"02",
    subs:[
      {id:"ifswitch", title:"if & switch"},
      {id:"loops", title:"Loops"},
      {id:"guardternary", title:"guard, Ternary & Loop Control"},
    ]
  },
  {
    id:"funcs", title:"Functions & Closures", icon:"03",
    subs:[
      {id:"functions", title:"Functions"},
      {id:"closures", title:"Closures"},
      {id:"closurescapture", title:"Capturing, Escaping & Autoclosures"},
      {id:"errorhandling", title:"Error Handling"},
      {id:"paramshof", title:"Parameters, Closures & Higher-Order Funcs"},
    ]
  },
  {
    id:"collections", title:"Collections", icon:"04",
    subs:[
      {id:"arrays", title:"Arrays"},
      {id:"dicts", title:"Dictionaries"},
      {id:"generics", title:"Generics"},
      {id:"sets", title:"Sets & Transformations"},
    ]
  },
  {
    id:"oop", title:"Structs, Classes & Protocols", icon:"05",
    subs:[
      {id:"structclass", title:"Struct vs Class"},
      {id:"protocols", title:"Protocols"},
      {id:"arc", title:"ARC & Memory Management"},
      {id:"extensionsaccess", title:"Extensions & Access Control"},
      {id:"propsmethods", title:"Properties, Methods & Initializers"},
    ]
  },
  {
    id:"enums", title:"Enumerations", icon:"06",
    subs:[
      {id:"enumbasics", title:"Enums & switch"},
      {id:"enumadvanced", title:"Raw & Associated Values"},
    ]
  },
  {
    id:"concurrency", title:"Concurrency", icon:"07",
    subs:[
      {id:"asyncawait", title:"async/await"},
      {id:"actors", title:"Actors"},
      {id:"taskgroups", title:"Task Groups, MainActor & Async Sequences"},
    ]
  },
  {
    id:"combine", title:"Combine", icon:"08",
    subs:[
      {id:"pubsub", title:"Publishers & Subscribers"},
      {id:"operators", title:"Operators"},
    ]
  },
  {
    id:"coredata", title:"Core Data", icon:"09",
    subs:[
      {id:"datamodel", title:"Model & Fetching"},
      {id:"savingrels", title:"Saving & Relationships"},
    ]
  },
  {
    id:"architecture", title:"Architecture", icon:"10",
    subs:[
      {id:"mvcvsmvvm", title:"MVC vs MVVM"},
      {id:"mvvmpractice", title:"MVVM in Practice"},
    ]
  },
  {
    id:"designprinciples", title:"Design Principles", icon:"11",
    subs:[
      {id:"solid", title:"SOLID Principles"},
      {id:"pod", title:"Protocol-Oriented Design"},
    ]
  },
  {
    id:"designpatterns", title:"Design Patterns", icon:"12",
    subs:[
      {id:"singletonfactory", title:"Singleton & Factory"},
      {id:"observerdelegate", title:"Observer & Delegate"},
      {id:"coordinatordi", title:"Coordinator & Dependency Injection"},
    ]
  },
  {
    id:"strings", title:"Strings", icon:"13",
    subs:[
      {id:"stringsdeep", title:"Strings, Indices & Regex"},
    ]
  },
  {
    id:"functional", title:"Functional Programming", icon:"14",
    subs:[
      {id:"funcprog", title:"map, filter, reduce & friends"},
    ]
  },
  {
    id:"oopfoundations", title:"Object-Oriented Programming", icon:"15",
    subs:[
      {id:"inheritance", title:"Inheritance, Polymorphism & Static Members"},
    ]
  },
  {
    id:"propsflow", title:"Property Features & Advanced Flow", icon:"16",
    subs:[
      {id:"propflow", title:"Observers, Lazy, defer & Pattern Matching"},
    ]
  },
  {
    id:"netpersist", title:"Networking & Persistence", icon:"17",
    subs:[
      {id:"networking", title:"URLSession, Codable & Local Storage"},
    ]
  },
  {
    id:"testingtools", title:"Testing & Tooling", icon:"18",
    subs:[
      {id:"testingspm", title:"XCTest & Swift Package Manager"},
    ]
  },
  {
    id:"swiftui", title:"SwiftUI Essentials", icon:"19",
    subs:[
      {id:"swiftuibasics", title:"Views, State, Bindings & Navigation"},
    ]
  },
  {
    id:"advancedswift", title:"Advanced Swift", icon:"20",
    subs:[
      {id:"advancedgrab", title:"Opaque Types, Key Paths, Macros & More"},
    ]
  },
  {
    id:"resultbuilders", title:"Result Builders", icon:"21",
    subs:[
      {id:"resultbuilderbasics", title:"@resultBuilder & SwiftUI's DSL"},
    ]
  },
  {
    id:"performance", title:"Performance", icon:"22",
    subs:[
      {id:"performancebasics", title:"Value Semantics, COW & Profiling"},
    ]
  },
];

// Flatten for prev/next navigation
const flat = [];
course.forEach(m => m.subs.forEach(s => flat.push({menu:m, sub:s})));

/* ======================= RENDER OUTLINE ======================= */
const outlineEl = document.getElementById("outline");
course.forEach((menu, mi) => {
  const group = document.createElement("div");
  group.className = "menu-group";

  const btn = document.createElement("button");
  btn.className = "menu-btn";
  btn.setAttribute("aria-expanded", mi===0 ? "true" : "false");
  btn.innerHTML = `<span class="num">${menu.icon}</span><span>${menu.title}</span><span class="chev">▶</span>`;

  const list = document.createElement("ul");
  list.className = "submenu-list" + (mi===0 ? " open" : "");
  menu.subs.forEach(sub => {
    const li = document.createElement("li");
    const sbtn = document.createElement("button");
    sbtn.className = "sub-btn";
    sbtn.dataset.menu = menu.id;
    sbtn.dataset.sub = sub.id;
    sbtn.innerHTML = `<span class="pip"></span>${sub.title}`;
    sbtn.addEventListener("click", () => selectLesson(menu.id, sub.id));
    li.appendChild(sbtn);
    list.appendChild(li);
  });

  btn.addEventListener("click", () => {
    const isOpen = list.classList.contains("open");
    list.classList.toggle("open", !isOpen);
    btn.setAttribute("aria-expanded", String(!isOpen));
  });

  group.appendChild(btn);
  group.appendChild(list);
  outlineEl.appendChild(group);
});

function setActiveSub(menuId, subId){
  document.querySelectorAll(".sub-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.menu===menuId && b.dataset.sub===subId);
  });
  document.querySelectorAll(".menu-group").forEach(g=>{
    const list = g.querySelector(".submenu-list");
    const hasActive = list.querySelector(".sub-btn.active");
    if(hasActive){
      list.classList.add("open");
      g.querySelector(".menu-btn").setAttribute("aria-expanded","true");
    }
  });
}

/* ======================= MOBILE TOGGLE ======================= */
const sidebar = document.getElementById("sidebar");
const scrim = document.getElementById("scrim");
document.getElementById("menuToggle").addEventListener("click", ()=>{
  sidebar.classList.add("open"); scrim.classList.add("show");
});
scrim.addEventListener("click", ()=>{
  sidebar.classList.remove("open"); scrim.classList.remove("show");
});

/* ======================= LESSON SELECTION ======================= */
function selectLesson(menuId, subId){
  setActiveSub(menuId, subId);
  renderLesson(menuId, subId);
  document.getElementById("content").scrollIntoView({block:"start"});
  document.querySelector(".main").scrollTo(0,0);
  sidebar.classList.remove("open"); scrim.classList.remove("show");
}

function renderLesson(menuId, subId){
  const menu = course.find(m=>m.id===menuId);
  const idx = flat.findIndex(f=>f.menu.id===menuId && f.sub.id===subId);
  document.getElementById("crumbs").innerHTML = `${menu.title} <span style="color:var(--text-dim)">/</span> <b>${flat[idx].sub.title}</b>`;

  const content = document.getElementById("content");
  content.innerHTML = lessonHTML(subId);
  content.appendChild(buildNavFooter(idx));
  initInteractive(subId);
}

function buildNavFooter(idx){
  const wrap = document.createElement("div");
  wrap.className = "nav-footer";
  const prev = flat[idx-1], next = flat[idx+1];
  if(prev){
    const d = document.createElement("div");
    d.className = "nf-link prev";
    d.innerHTML = `<span class="nf-dir">← Previous</span><span class="nf-title">${prev.sub.title}</span>`;
    d.addEventListener("click", ()=>selectLesson(prev.menu.id, prev.sub.id));
    wrap.appendChild(d);
  } else { wrap.appendChild(document.createElement("div")); }
  if(next){
    const d = document.createElement("div");
    d.className = "nf-link next";
    d.innerHTML = `<span class="nf-dir">Next →</span><span class="nf-title">${next.sub.title}</span>`;
    d.addEventListener("click", ()=>selectLesson(next.menu.id, next.sub.id));
    wrap.appendChild(d);
  }
  return wrap;
}

/* ======================= LESSON CONTENT (static HTML per lesson) ======================= */
function lessonHTML(id){
  const T = LESSON_TEXT[id];
  return `
    <div class="eyebrow">${T.eyebrow}</div>
    <h1>${T.title}</h1>
    <p class="lede">${T.lede}</p>
    ${T.body}
  `;
}

      <h2>Copy vs. share</h2>

<span class="tk-kw">class</span> <span class="tk-type">Counter</span> { <span class="tk-kw">var</span> x = <span class="tk-num">0</span> }

<span class="tk-kw">var</span> p1 = <span class="tk-type">Point</span>(); <span class="tk-kw">var</span> p2 = p1
p2.x = <span class="tk-num">99</span>   <span class="tk-com">// p1.x is still 0</span>

  protocols: {
    eyebrow:"Chapter 05 · Structs, Classes & Protocols", title:"Protocols",
    lede:"A protocol is a contract: a list of methods or properties any type can promise to implement. Code written against the protocol works with anything that conforms — structs, classes, even enums.",
    body:`
      <h2>One contract, many shapes</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Protocols.swift</span></div>
      <pre><span class="tk-kw">protocol</span> <span class="tk-type">Honkable</span> { <span class="tk-kw">func</span> <span class="tk-fn">honk</span>() -&gt; <span class="tk-type">String</span> }

<span class="tk-kw">struct</span> <span class="tk-type">Car</span>: <span class="tk-type">Honkable</span> { <span class="tk-kw">func</span> <span class="tk-fn">honk</span>() -&gt; <span class="tk-type">String</span> { <span class="tk-str">"Beep!"</span> } }
<span class="tk-kw">struct</span> <span class="tk-type">Goose</span>: <span class="tk-type">Honkable</span> { <span class="tk-kw">func</span> <span class="tk-fn">honk</span>() -&gt; <span class="tk-type">String</span> { <span class="tk-str">"HONK."</span> } }</pre></div>
      <h2>Swap the conforming type</h2>
      <div class="lab" id="lab-protocols">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Protocol dispatch</span><span class="lab-hint">pick a type, call honk()</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Honkable type</label>
              <div class="seg" id="proto-seg">
                <button data-v="Car" class="active">Car</button>
                <button data-v="Goose">Goose</button>
                <button data-v="Bicycle">Bicycle</button>
              </div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="proto-run">thing.honk() →</button></div>
          </div>
          <div class="console" id="proto-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>The calling code never branches on which type it has — it just trusts the contract and calls <code class="inline">honk()</code>. That's what makes protocols the backbone of flexible Swift APIs.</p>
      <h2>Inheriting a contract, and leaving a type placeholder open</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">ProtocolInheritance.swift</span></div>
      <pre><span class="tk-kw">protocol</span> <span class="tk-type">Vehicle</span> { <span class="tk-kw">var</span> wheels: <span class="tk-type">Int</span> { <span class="tk-kw">get</span> } }
<span class="tk-kw">protocol</span> <span class="tk-type">MotorizedVehicle</span>: <span class="tk-type">Vehicle</span> { <span class="tk-kw">func</span> <span class="tk-fn">startEngine</span>() }   <span class="tk-com">// inherits Vehicle's requirement, adds its own</span>

<span class="tk-kw">protocol</span> <span class="tk-type">Container</span> {
    <span class="tk-kw">associatedtype</span> <span class="tk-type">Item</span>           <span class="tk-com">// a placeholder type, filled in by whoever conforms</span>
    <span class="tk-kw">var</span> items: [Item] { <span class="tk-kw">get</span> }
}
<span class="tk-kw">struct</span> <span class="tk-type">Garage</span>: <span class="tk-type">Container</span> { <span class="tk-kw">var</span> items: [<span class="tk-type">Car</span>] = [] }   <span class="tk-com">// Item == Car, inferred</span>

<span class="tk-kw">let</span> fleet: [<span class="tk-kw">any</span> <span class="tk-type">Vehicle</span>] = [<span class="tk-type">Car</span>(), <span class="tk-type">Bicycle</span>()]   <span class="tk-com">// any: a box that erases the concrete type</span></pre></div>
      <p><code class="inline">MotorizedVehicle</code> conformers must satisfy both protocols' requirements. <code class="inline">associatedtype</code> is what lets one protocol describe a family of containers without committing to what they hold — Swift fills in <code class="inline">Item</code> from how each type actually conforms.</p>
    `
  },

  asyncawait: {
    eyebrow:"Chapter 07 · Concurrency", title:"async/await",
    lede:"async marks a function as one that can pause without blocking the thread it's running on. await is where you choose to pause — and the compiler tracks every one of those points for you.",
    body:`
      <h2>Pausing without blocking</h2>
      <p>A normal function returns the moment its last line runs. An <code class="inline">async</code> function can suspend in the middle — at an <code class="inline">await</code> — and hand control back, then resume later once the awaited work finishes.</p>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Network.swift</span></div>
      <pre><span class="tk-kw">func</span> <span class="tk-fn">fetchProfile</span>() <span class="tk-kw">async</span> <span class="tk-kw">throws</span> -&gt; <span class="tk-type">Profile</span> {
    <span class="tk-kw">let</span> (data, _) = <span class="tk-kw">try</span> <span class="tk-kw">await</span> <span class="tk-type">URLSession</span>.shared.<span class="tk-fn">data</span>(from: url)
    <span class="tk-kw">return</span> <span class="tk-kw">try</span> <span class="tk-type">JSONDecoder</span>().<span class="tk-fn">decode</span>(<span class="tk-type">Profile</span>.<span class="tk-kw">self</span>, from: data)
}

<span class="tk-kw">let</span> profile = <span class="tk-kw">try</span> <span class="tk-kw">await</span> <span class="tk-fn">fetchProfile</span>()</pre></div>
      <p>No completion handler, no nested closures — the code reads top to bottom even though it suspends partway through.</p>
      <h2>Watch a function suspend and resume</h2>
      <div class="lab" id="lab-asyncawait">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Suspension timeline</span><span class="lab-hint">simulated network delay</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Simulated latency</label>
              <div class="seg" id="aa-seg">
                <button data-v="fast" class="active">fast (~0.4s)</button>
                <button data-v="slow">slow (~1.6s)</button>
                <button data-v="fail">fails</button>
              </div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="aa-run">await fetchProfile() →</button></div>
          </div>
          <div class="console" id="aa-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>Notice the caller's thread is never frozen waiting — in a real app, the UI keeps scrolling while this is in flight. <code class="inline">await</code> only marks where <em>this</em> function's progress can pause.</p>
    `
  },

  actors: {
    eyebrow:"Chapter 07 · Concurrency", title:"Actors",
    lede:"A class shared across threads can have two pieces of code mutate the same property at once — a data race. An actor only ever runs one piece of code against its state at a time, so that race can't happen.",
    body:`
      <h2>One door in, no exceptions</h2>
      <p>Every call into an actor's methods or properties is serialized automatically. Two concurrent deposits don't interleave — the second simply waits its turn.</p>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">BankAccount.swift</span></div>
      <pre><span class="tk-kw">actor</span> <span class="tk-type">BankAccount</span> {
    <span class="tk-kw">private</span> <span class="tk-kw">var</span> balance = <span class="tk-num">0</span>
    <span class="tk-kw">func</span> <span class="tk-fn">deposit</span>(_ amount: <span class="tk-type">Int</span>) { balance += amount }
    <span class="tk-kw">func</span> <span class="tk-fn">current</span>() -&gt; <span class="tk-type">Int</span> { balance }
}

<span class="tk-kw">let</span> account = <span class="tk-type">BankAccount</span>()
<span class="tk-kw">await</span> account.<span class="tk-fn">deposit</span>(<span class="tk-num">50</span>)   <span class="tk-com">// every call hops through await</span></pre></div>
      <h2>Fire concurrent deposits at a class vs. an actor</h2>
      <div class="lab" id="lab-actors">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Race condition simulator</span><span class="lab-hint">10 concurrent +1 deposits, each with a random tiny delay</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Storage kind</label>
              <div class="seg" id="actor-seg"><button data-v="class" class="active">plain class</button><button data-v="actor">actor</button></div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="actor-run">fire 10 concurrent deposits →</button></div>
          </div>
          <div class="two-col">
            <div class="box-card"><h4>expected balance</h4><div class="val">10</div></div>
            <div class="box-card"><h4>actual balance</h4><div class="val" id="actor-bal">0</div></div>
          </div>
          <div class="console" id="actor-console" style="margin-top:12px;"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>With a plain class, two deposits can both read the old balance before either writes it back — one increment gets silently lost. The actor never lets that interleaving happen, so it always lands on the right number.</p>
    `
  },

  pubsub: {
    eyebrow:"Chapter 08 · Combine", title:"Publishers & Subscribers",
    lede:"Combine models a value over time as a stream: a Publisher emits it, a Subscriber reacts to it. @Published turns an ordinary property into a publisher with one word.",
    body:`
      <h2>A property that broadcasts its own changes</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Ticker.swift</span></div>
      <pre><span class="tk-kw">class</span> <span class="tk-type">Ticker</span> {
    <span class="tk-kw">@Published</span> <span class="tk-kw">var</span> price = <span class="tk-num">0</span>
}

<span class="tk-kw">let</span> ticker = <span class="tk-type">Ticker</span>()
<span class="tk-kw">let</span> cancellable = ticker.$price
    .sink { newPrice <span class="tk-kw">in</span> <span class="tk-fn">print</span>(<span class="tk-str">"Price is now \\(newPrice)"</span>) }

ticker.price = <span class="tk-num">102</span>   <span class="tk-com">// sink fires immediately</span></pre></div>
      <p>The <code class="inline">$</code> prefix exposes the publisher for the property. <code class="inline">sink</code> is the simplest subscriber: a closure that runs every time a new value arrives.</p>
      <h2>Publish a value, watch the sink fire</h2>
      <div class="lab" id="lab-pubsub">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">@Published / sink</span><span class="lab-hint">subscribed since the lesson loaded</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>new ticker.price</label><input type="number" id="ps-val" value="102" /></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="ps-run">ticker.price = … →</button></div>
          </div>
          <div class="console" id="ps-console"><span class="arrow">›</span><span class="info">Price is now 0</span></div>
        </div>
      </div>
      <p>Every assignment re-fires the sink — there's no polling, no "did it change?" check. The subscriber is simply told.</p>
    `
  },

  operators: {
    eyebrow:"Chapter 08 · Combine", title:"Operators",
    lede:"Operators sit between a publisher and its subscriber, transforming the stream as it flows — the same map and filter you know from arrays, but applied over time.",
    body:`
      <h2>Chaining transformations on a stream</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Operators.swift</span></div>
      <pre>$searchText
    .filter { !<span class="tk-fn">$0</span>.isEmpty }
    .map { <span class="tk-fn">$0</span>.lowercased() }
    .sink { query <span class="tk-kw">in</span> <span class="tk-fn">search</span>(query) }</pre></div>
      <p>Each value passes through the chain left to right — <code class="inline">filter</code> drops empty strings before <code class="inline">map</code> ever sees them, so <code class="inline">search</code> only ever receives a clean, lowercased query.</p>
      <h2>Build a small pipeline</h2>
      <div class="lab" id="lab-operators">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Operator pipeline</span><span class="lab-hint">values pushed one at a time</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Pipeline</label>
              <div class="seg" id="op-seg">
                <button data-v="double" class="active">.map { $0 * 2 }</button>
                <button data-v="even">.filter { $0 % 2 == 0 }</button>
                <button data-v="evendouble">.filter even .map double</button>
              </div>
            </div>
            <div class="ctl"><label>value to push</label><input type="number" id="op-val" value="3" style="width:80px;"/></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="op-run">push →</button></div>
          </div>
          <div class="console" id="op-console"><span class="arrow">›</span><span class="info">ready</span></div>
        </div>
      </div>
      <p>Switch pipelines and push the same value again — the dropped values in the filter case never reach the sink at all; they're not transformed, they simply never arrive.</p>
    `
  },

  datamodel: {
    eyebrow:"Chapter 09 · Core Data", title:"Model & Fetching",
    lede:"Core Data stores objects as managed instances of entities you define in a model file. To get any of them back, you describe what you want with an NSFetchRequest, optionally narrowed by a predicate.",
    body:`
      <h2>Describing what you want back</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Fetching.swift</span></div>
      <pre><span class="tk-kw">let</span> request: <span class="tk-type">NSFetchRequest</span>&lt;<span class="tk-type">Book</span>&gt; = <span class="tk-type">Book</span>.fetchRequest()
request.predicate = <span class="tk-type">NSPredicate</span>(format: <span class="tk-str">"isRead == false"</span>)
request.sortDescriptors = [<span class="tk-type">NSSortDescriptor</span>(key: <span class="tk-str">"title"</span>, ascending: <span class="tk-kw">true</span>)]

<span class="tk-kw">let</span> unread = <span class="tk-kw">try</span> context.<span class="tk-fn">fetch</span>(request)</pre></div>
      <p>Nothing is loaded into memory until <code class="inline">fetch</code> runs — the predicate is translated into SQL underneath, so filtering happens in the store, not in a Swift loop after the fact.</p>

            <div class="ctl"><label>NSPredicate</label>
              <div class="seg" id="dm-seg">

                <button data-v="unread">isRead == false</button>
                <button data-v="short">pageCount &lt; 300</button>
              </div>
            </div>
          </div>
          <div class="tape" id="dm-tape"></div>
          <div class="console" id="dm-console"><span class="arrow">›</span><span class="info">try context.fetch(request)</span></div>
        </div>
      </div>
    `
  },

  savingrels: {
    eyebrow:"Chapter 09 · Core Data", title:"Saving & Relationships",
    lede:"New or edited objects live only in memory, in the managed object context, until you explicitly save. Relationships connect entities to each other and stay consistent automatically in both directions.",
    body:`
      <h2>The context is a scratchpad, not the database</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Saving.swift</span></div>
      <pre><span class="tk-kw">let</span> book = <span class="tk-type">Book</span>(context: context)
book.title = <span class="tk-str">"Dune"</span>
book.author = author   <span class="tk-com">// inverse relationship updates author.books too</span>

<span class="tk-kw">if</span> context.hasChanges {
    <span class="tk-kw">try</span> context.<span class="tk-fn">save</span>()   <span class="tk-com">// now it's persisted to disk</span>
}</pre></div>
      <p>Until <code class="inline">save()</code> runs, every change is just a pending edit in the context — quit the app and an unsaved <code class="inline">book</code> is gone, no different than any other in-memory object.</p>
      <h2>Insert, then watch the context become dirty</h2>
      <div class="lab" id="lab-savingrels">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Context lifecycle</span><span class="lab-hint">insert → dirty → save</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>book title</label><input type="text" id="sr-title" value="Dune" /></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="sr-insert">Book(context:) →</button></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn secondary" id="sr-save">context.save() →</button></div>
          </div>
          <div class="two-col">
            <div class="box-card"><h4>context state</h4><div class="val" id="sr-state">clean</div></div>
            <div class="box-card"><h4>persisted rows</h4><div class="val" id="sr-count">0</div></div>
          </div>
          <div class="console" id="sr-console" style="margin-top:12px;"><span class="arrow">›</span><span class="info">ready</span></div>
        </div>
      </div>
      <p>Insert without saving and the context flips to <code class="inline">dirty</code> while the persisted count doesn't move — only <code class="inline">save()</code> writes it through.</p>
    `
  },

  mvcvsmvvm: {
    eyebrow:"Chapter 10 · Architecture", title:"MVC vs MVVM",
    lede:"Both patterns split an app into layers so a screen's logic doesn't get tangled with its display code. The difference is where state and formatting logic are allowed to live.",
    body:`
      <h2>Where the logic lives</h2>
      <p>In MVC, the view controller often ends up doing double duty — coordinating the view <em>and</em> holding business logic, which is how "Massive View Controller" happens. MVVM pulls that logic out into a ViewModel the view binds to, leaving the view controller as a thin pass-through.</p>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Compare.swift</span></div>
      <pre><span class="tk-com">// MVC: the controller formats data itself</span>
label.text = <span class="tk-str">"$\\(String(format: "%.2f", price))"</span>

<span class="tk-com">// MVVM: the view model exposes it already formatted</span>
label.text = viewModel.formattedPrice</pre></div>
      <h2>Drag logic between layers</h2>
      <div class="lab" id="lab-mvcvsmvvm">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Where does formatting live?</span><span class="lab-hint">pick a pattern, see who owns it</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Pattern</label>
              <div class="seg" id="mvc-seg"><button data-v="mvc" class="active">MVC</button><button data-v="mvvm">MVVM</button></div>
            </div>
          </div>
          <div class="two-col">
            <div class="box-card"><h4>View Controller</h4><div class="val" id="mvc-vc" style="font-size:13px;">formats price itself</div></div>
            <div class="box-card"><h4>ViewModel</h4><div class="val" id="mvc-vm" style="font-size:13px;">—</div></div>
          </div>
          <div class="console" id="mvc-console" style="margin-top:12px;"><span class="arrow">›</span><span class="info">label.text = "$12.50"</span></div>
        </div>
      </div>
      <p>Neither layer disappears in MVVM — the controller still exists, it just no longer holds formatting decisions. Testing <code class="inline">formattedPrice</code> directly, with no UIKit involved at all, is the payoff.</p>
    `
  },

  mvvmpractice: {
    eyebrow:"Chapter 10 · Architecture", title:"MVVM in Practice",
    lede:"A ViewModel exposes @Published state the view observes. Type into a field, the ViewModel updates, and any view bound to it redraws — no manual refresh calls anywhere.",
    body:`
      <h2>Binding a view to a view model</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">SignUpViewModel.swift</span></div>
      <pre><span class="tk-kw">class</span> <span class="tk-type">SignUpViewModel</span>: <span class="tk-type">ObservableObject</span> {
    <span class="tk-kw">@Published</span> <span class="tk-kw">var</span> username = <span class="tk-str">""</span>
    <span class="tk-kw">var</span> isValid: <span class="tk-type">Bool</span> { username.count &gt;= <span class="tk-num">3</span> }
}

<span class="tk-com">// View</span>
<span class="tk-type">TextField</span>(<span class="tk-str">"Username"</span>, text: $viewModel.username)
<span class="tk-type">Text</span>(viewModel.isValid ? <span class="tk-str">"✓ available"</span> : <span class="tk-str">"too short"</span>)</pre></div>
      <h2>Type a username, watch validity follow</h2>
      <div class="lab" id="lab-mvvmpractice">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">@Published binding</span><span class="lab-hint">isValid recomputes on every keystroke</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>username</label><input type="text" id="mvvmp-input" value="ad" /></div>
          </div>
          <div class="console" id="mvvmp-console"><span class="arrow">›</span><span class="err">too short</span></div>
        </div>
      </div>
      <p>The view never asks "has anything changed?" — it just reads <code class="inline">viewModel.isValid</code> whenever it redraws, and the ViewModel is the single source of truth for what that value currently is.</p>
    `
  },

  solid: {

<span class="tk-kw">class</span> <span class="tk-type">Invoice</span> {
    <span class="tk-kw">func</span> <span class="tk-fn">format</span>() -&gt; <span class="tk-type">String</span> { ... }
    <span class="tk-kw">func</span> <span class="tk-fn">save</span>(to path: <span class="tk-type">String</span>) { ... }
    <span class="tk-kw">func</span> <span class="tk-fn">validate</span>() -&gt; <span class="tk-type">Bool</span> { ... }
}</pre></div>
      <h2>Pick a letter, see the question it asks</h2>

  pod: {
    eyebrow:"Chapter 11 · Design Principles", title:"Protocol-Oriented Design",
    lede:"Swift encourages composing behavior through protocol extensions rather than inheriting it through a class hierarchy. A type can adopt a default implementation for free, or override it for its own needs.",
    body:`
      <h2>A default that any conformer can override</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Describable.swift</span></div>
      <pre><span class="tk-kw">protocol</span> <span class="tk-type">Describable</span> { <span class="tk-kw">var</span> summary: <span class="tk-type">String</span> { <span class="tk-kw">get</span> } }

<span class="tk-kw">extension</span> <span class="tk-type">Describable</span> {
    <span class="tk-kw">var</span> summary: <span class="tk-type">String</span> { <span class="tk-str">"a Describable thing"</span> }   <span class="tk-com">// default</span>
}

<span class="tk-kw">struct</span> <span class="tk-type">Receipt</span>: <span class="tk-type">Describable</span> {}                       <span class="tk-com">// uses default</span>
<span class="tk-kw">struct</span> <span class="tk-type">Invoice</span>: <span class="tk-type">Describable</span> {
    <span class="tk-kw">var</span> summary: <span class="tk-type">String</span> { <span class="tk-str">"Invoice #4821"</span> }            <span class="tk-com">// overrides it</span>
}</pre></div>
      <h2>Adopt the default, or override it</h2>
      <div class="lab" id="lab-pod">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Default implementation</span><span class="lab-hint">pick a conforming type</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Type</label>
              <div class="seg" id="pod-seg">
                <button data-v="Receipt" class="active">Receipt</button>
                <button data-v="Invoice">Invoice</button>
                <button data-v="Ticket">Ticket</button>
              </div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="pod-run">thing.summary →</button></div>
          </div>
          <div class="console" id="pod-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>No base class, no <code class="inline">super.summary</code> call required — each type either inherits the extension's behavior for free or quietly shadows it with its own.</p>
    `
  },

  singletonfactory: {
    eyebrow:"Chapter 12 · Design Patterns", title:"Singleton & Factory",
    lede:"A singleton guarantees one shared instance for the lifetime of the app. A factory hides which concrete type gets created behind a single call, chosen by what you pass in.",
    body:`
      <h2>One shared instance, however you reach it</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Patterns.swift</span></div>
      <pre><span class="tk-kw">class</span> <span class="tk-type">AnalyticsLogger</span> {
    <span class="tk-kw">static</span> <span class="tk-kw">let</span> shared = <span class="tk-type">AnalyticsLogger</span>()
    <span class="tk-kw">private</span> <span class="tk-kw">init</span>() {}
    <span class="tk-kw">var</span> eventCount = <span class="tk-num">0</span>
}

<span class="tk-kw">enum</span> <span class="tk-type">VehicleFactory</span> {
    <span class="tk-kw">static</span> <span class="tk-kw">func</span> <span class="tk-fn">make</span>(_ kind: <span class="tk-type">String</span>) -&gt; <span class="tk-type">Vehicle</span> {
        <span class="tk-kw">switch</span> kind {
        <span class="tk-kw">case</span> <span class="tk-str">"car"</span>: <span class="tk-kw">return</span> <span class="tk-type">Car</span>()
        <span class="tk-kw">default</span>:   <span class="tk-kw">return</span> <span class="tk-type">Bicycle</span>()
        }
    }
}</pre></div>
      <h2>Call .shared repeatedly, then ask a factory for a type</h2>
      <div class="lab" id="lab-singletonfactory">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Singleton & Factory</span><span class="lab-hint">two patterns, side by side</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="sf-shared">AnalyticsLogger.shared.eventCount += 1 →</button></div>
          </div>
          <div class="two-col">
            <div class="box-card"><h4>shared.eventCount</h4><div class="val" id="sf-count">0</div></div>
            <div class="box-card"><h4>VehicleFactory.make(_:)</h4>
              <div class="seg" id="sf-seg" style="margin-top:6px;"><button data-v="car" class="active">"car"</button><button data-v="boat">"boat"</button></div>
            </div>
          </div>
          <div class="console" id="sf-console" style="margin-top:12px;"><span class="arrow">›</span><span class="info">press a button</span></div>
        </div>
      </div>
      <p>Every call to <code class="inline">.shared</code> returns the exact same instance, so the counter never resets — while the factory hands back a different concrete type depending only on the string you pass it.</p>
    `
  },

  observerdelegate: {
    eyebrow:"Chapter 12 · Design Patterns", title:"Observer & Delegate",
    lede:"A delegate is a one-to-one contract: an object hands off specific decisions to exactly one delegate. The observer pattern is one-to-many: any number of listeners can react to the same event.",
    body:`
      <h2>One delegate, asked a direct question</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Delegate.swift</span></div>
      <pre><span class="tk-kw">protocol</span> <span class="tk-type">DownloadDelegate</span>: <span class="tk-type">AnyObject</span> {
    <span class="tk-kw">func</span> <span class="tk-fn">downloadDidFinish</span>(_ result: <span class="tk-type">String</span>)
}

<span class="tk-kw">class</span> <span class="tk-type">Downloader</span> {
    <span class="tk-kw">weak</span> <span class="tk-kw">var</span> delegate: <span class="tk-type">DownloadDelegate</span>?
    <span class="tk-kw">func</span> <span class="tk-fn">finish</span>() { delegate?.<span class="tk-fn">downloadDidFinish</span>(<span class="tk-str">"ok"</span>) }
}</pre></div>
      <p>Compare that to <code class="inline">NotificationCenter</code>, where any number of observers can register for the same event and every one of them gets notified.</p>
      <h2>One event, fired at one delegate or many observers</h2>
      <div class="lab" id="lab-observerdelegate">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Fan-out comparison</span><span class="lab-hint">fire the event, watch who responds</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Pattern</label>
              <div class="seg" id="od-seg"><button data-v="delegate" class="active">delegate (1 listener)</button><button data-v="observer">NotificationCenter (3 listeners)</button></div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="od-run">downloader.finish() →</button></div>
          </div>
          <div class="console" id="od-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>The delegate pattern caps the audience at one by design — wiring up a second object to also receive <code class="inline">downloadDidFinish</code> means replacing the first, not adding to it.</p>
    `
  },

  arc: {
    eyebrow:"Chapter 05 · Structs, Classes & Protocols", title:"ARC & Memory Management",
    lede:"Swift counts the strong references to every class instance. The moment that count hits zero, the instance is deallocated — no garbage collector pauses, but a strong reference cycle means the count never reaches zero at all.",
    body:`
      <h2>Two objects, each holding the other</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">RetainCycle.swift</span></div>
      <pre><span class="tk-kw">class</span> <span class="tk-type">Person</span> { <span class="tk-kw">var</span> apartment: <span class="tk-type">Apartment</span>? }
<span class="tk-kw">class</span> <span class="tk-type">Apartment</span> { <span class="tk-kw">weak</span> <span class="tk-kw">var</span> tenant: <span class="tk-type">Person</span>? }  <span class="tk-com">// weak breaks the cycle</span>

<span class="tk-kw">var</span> ada: <span class="tk-type">Person</span>? = <span class="tk-type">Person</span>()
<span class="tk-kw">var</span> flat: <span class="tk-type">Apartment</span>? = <span class="tk-type">Apartment</span>()
ada?.apartment = flat
flat?.tenant = ada</pre></div>
      <div class="rule"><span class="rule-ic">RULE OF THUMB</span><p>If a child needs to point back at its parent — a delegate, a closure capturing <code class="inline">self</code>, a child view model pointing at its container — make that back-reference <strong><code class="inline">weak</code></strong> (or <code class="inline">unowned</code> if it can never legitimately be nil). The "owning" direction stays strong; the "pointing back" direction doesn't.</p></div>
      <h2>Watch the reference count, with and without weak</h2>
      <div class="lab" id="lab-arc">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Retain cycle simulator</span><span class="lab-hint">set both vars to nil, see who gets deallocated</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Apartment.tenant</label>
              <div class="seg" id="arc-seg"><button data-v="weak" class="active">weak var</button><button data-v="strong">var (strong)</button></div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="arc-run">ada = nil; flat = nil →</button></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn secondary" id="arc-reset">reset</button></div>
          </div>
          <div class="two-col">
            <div class="box-card"><h4>Person instance</h4><div class="val" id="arc-person" style="font-size:15px;">alive (refs: 1)</div></div>
            <div class="box-card"><h4>Apartment instance</h4><div class="val" id="arc-apt" style="font-size:15px;">alive (refs: 1)</div></div>
          </div>
          <div class="console" id="arc-console" style="margin-top:12px;"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>With a strong <code class="inline">tenant</code>, both instances still hold a reference to each other after both local variables are cleared — neither count reaches zero, and both leak silently for the rest of the app's life.</p>
    `
  },

  errorhandling: {
    eyebrow:"Chapter 03 · Functions & Closures", title:"Error Handling",
    lede:"A throwing function forces the caller to deal with failure at the call site — there's no silent null, no forgotten error code. How you choose to handle it is still up to you.",
    body:`
      <h2>Four ways to call a throwing function</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Errors.swift</span></div>
      <pre><span class="tk-kw">enum</span> <span class="tk-type">ParseError</span>: <span class="tk-type">Error</span> { <span class="tk-kw">case</span> empty, malformed }

<span class="tk-kw">func</span> <span class="tk-fn">parse</span>(_ s: <span class="tk-type">String</span>) <span class="tk-kw">throws</span> -&gt; <span class="tk-type">Int</span> {
    <span class="tk-kw">guard</span> !s.isEmpty <span class="tk-kw">else</span> { <span class="tk-kw">throw</span> <span class="tk-type">ParseError</span>.empty }
    <span class="tk-kw">guard</span> <span class="tk-kw">let</span> n = <span class="tk-type">Int</span>(s) <span class="tk-kw">else</span> { <span class="tk-kw">throw</span> <span class="tk-type">ParseError</span>.malformed }
    <span class="tk-kw">return</span> n
}

<span class="tk-kw">try</span> parse(s)            <span class="tk-com">// propagate — caller must handle</span>
<span class="tk-kw">try</span>? parse(s)           <span class="tk-com">// → Int?, error discarded to nil</span>
<span class="tk-kw">try</span>! parse(s)           <span class="tk-com">// crashes if it throws</span></pre></div>
      <div class="rule"><span class="rule-ic">RULE OF THUMB</span><p>Reach for <code class="inline">try?</code> only when you'd genuinely treat "it failed" and "it returned nil" identically. Reach for <code class="inline">try!</code> only when failure would mean a programmer error, not a runtime condition — e.g. force-unwrapping a bundled JSON file you control. Everywhere else, propagate with <code class="inline">try</code> and let the caller decide.</p></div>
      <h2>Try each form against good and bad input</h2>
      <div class="lab" id="lab-errorhandling">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">try / try? / try!</span><span class="lab-hint">parse(_:) on the input below</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>input string</label><input type="text" id="eh-input" value="42" /></div>
            <div class="ctl"><label>call form</label>
              <div class="seg" id="eh-seg">
                <button data-v="try" class="active">try parse(s)</button>
                <button data-v="tryq">try? parse(s)</button>
                <button data-v="tryb">try! parse(s)</button>
              </div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="eh-run">run →</button></div>
          </div>
          <div class="console" id="eh-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>Set the input to <code class="inline">""</code> and switch forms: <code class="inline">try</code> requires a <code class="inline">catch</code> you write, <code class="inline">try?</code> quietly becomes <code class="inline">nil</code>, and <code class="inline">try!</code> is the one that actually crashes the program.</p>
    `
  },

  generics: {
    eyebrow:"Chapter 04 · Collections", title:"Generics",
    lede:"A generic function or type is written once and works over any type that satisfies its constraints — the compiler generates the specialized version for you at each call site.",
    body:`
      <h2>One function, many concrete types</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Generics.swift</span></div>
      <pre><span class="tk-kw">func</span> <span class="tk-fn">firstMatch</span>&lt;T: <span class="tk-type">Equatable</span>&gt;(<span class="tk-kw">in</span> items: [T], equalTo target: T) -&gt; T? {
    <span class="tk-kw">for</span> item <span class="tk-kw">in</span> items <span class="tk-kw">where</span> item == target { <span class="tk-kw">return</span> item }
    <span class="tk-kw">return</span> <span class="tk-kw">nil</span>
}

<span class="tk-fn">firstMatch</span>(in: [<span class="tk-num">1</span>,<span class="tk-num">2</span>,<span class="tk-num">3</span>], equalTo: <span class="tk-num">2</span>)        <span class="tk-com">// T == Int</span>
<span class="tk-fn">firstMatch</span>(in: [<span class="tk-str">"a"</span>,<span class="tk-str">"b"</span>], equalTo: <span class="tk-str">"b"</span>)     <span class="tk-com">// T == String, same function</span></pre></div>
      <div class="rule"><span class="rule-ic">RULE OF THUMB</span><p>Reach for a generic when you'd otherwise copy-paste the same function or type for <code class="inline">Int</code>, then <code class="inline">String</code>, then your own model. Constrain <code class="inline">T</code> to only the protocol you actually need (<code class="inline">Equatable</code>, <code class="inline">Comparable</code>, <code class="inline">Hashable</code>) rather than reaching for <code class="inline">Any</code>, which throws type safety away entirely.</p></div>
      <h2>Run the same generic function over two element types</h2>
      <div class="lab" id="lab-generics">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">firstMatch&lt;T: Equatable&gt;</span><span class="lab-hint">same function, T inferred from the call</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Collection</label>
              <div class="seg" id="gen-seg">
                <button data-v="ints" class="active">[1, 2, 3, 4]: [Int]</button>
                <button data-v="strs">["fig","pear","kiwi"]: [String]</button>
              </div>
            </div>
            <div class="ctl"><label>target</label><input type="text" id="gen-target" value="3" /></div>

  extensionsaccess: {
    eyebrow:"Chapter 05 · Structs, Classes & Protocols", title:"Extensions & Access Control",
    lede:"Extensions let you add functionality to a type — even one you don't own — after the fact. Access control decides who outside the file or module is allowed to see what you added.",
    body:`
      <h2>Adding behavior to a type you don't own</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Extensions.swift</span></div>
      <pre><span class="tk-kw">extension</span> <span class="tk-type">String</span> {
    <span class="tk-kw">fileprivate</span> <span class="tk-kw">func</span> <span class="tk-fn">slugified</span>() -&gt; <span class="tk-type">String</span> {
        lowercased().replacingOccurrences(of: <span class="tk-str">" "</span>, with: <span class="tk-str">"-"</span>)
    }
    <span class="tk-kw">public</span> <span class="tk-kw">var</span> isBlank: <span class="tk-type">Bool</span> { trimmingCharacters(in: .whitespaces).isEmpty }
}</pre></div>
      <div class="rule"><span class="rule-ic">RULE OF THUMB</span><p>Default to the <strong>narrowest</strong> access level that still compiles where it's used: <code class="inline">private</code> for helpers only your type touches, <code class="inline">fileprivate</code> for things shared across extensions in one file, <code class="inline">internal</code> (the default) for your module, and <code class="inline">public</code>/<code class="inline">open</code> only for the deliberate surface of a framework. Widening access later is easy; narrowing it after other code depends on it is a breaking change.</p></div>
      <h2>Call slugified() from inside and outside the file</h2>
      <div class="lab" id="lab-extensionsaccess">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Access level checker</span><span class="lab-hint">same call, different caller location</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>slugified() access level</label>
              <div class="seg" id="ea-seg"><button data-v="fileprivate" class="active">fileprivate</button><button data-v="internal">internal</button></div>
            </div>
            <div class="ctl"><label>caller location</label>
              <div class="seg" id="ea-caller"><button data-v="same" class="active">same file</button><button data-v="other">other file, same module</button></div>
            </div>
          </div>
          <div class="console" id="ea-console"><span class="arrow">›</span><span class="info">"Hello World".slugified()</span></div>
        </div>
      </div>
      <p>Flip the caller to "other file" with <code class="inline">fileprivate</code> still selected and the call stops compiling — the access level is enforced exactly where you'd expect, at the call site, not at runtime.</p>
    `
  },

  opsio: {
    eyebrow:"Chapter 01 · The Basics", title:"Operators, I/O & Unwrapping",
    lede:"A handful of small mechanics get used constantly: arithmetic and comparison operators, comments, print, reading input, converting between types, and the shortest ways to deal with an optional.",
    body:`
      <h2>The everyday toolkit</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Basics2.swift</span></div>
      <pre><span class="tk-com">// Operators</span>
<span class="tk-kw">let</span> sum = <span class="tk-num">3</span> + <span class="tk-num">4</span> * <span class="tk-num">2</span>      <span class="tk-com">// 11 — * binds tighter than +</span>
<span class="tk-kw">let</span> equal = (sum == <span class="tk-num">11</span>)      <span class="tk-com">// comparison → Bool</span>

<span class="tk-com">// Comments</span>
<span class="tk-com">// a single-line comment</span>
<span class="tk-com">/* a block comment */</span>

<span class="tk-com">// Output and (rare, command-line) input</span>
<span class="tk-fn">print</span>(<span class="tk-str">"sum is \\(sum)"</span>)
<span class="tk-kw">let</span> line = readLine()      <span class="tk-com">// String? — nil if there's nothing to read</span>

<span class="tk-com">// Type conversion is always explicit</span>
<span class="tk-kw">let</span> n: <span class="tk-type">Int</span> = <span class="tk-num">5</span>
<span class="tk-kw">let</span> d = <span class="tk-type">Double</span>(n)            <span class="tk-com">// 5.0 — no silent Int → Double here</span>
<span class="tk-kw">let</span> s = <span class="tk-type">String</span>(n)            <span class="tk-com">// "5"</span></pre></div>
      <h2>The four ways to deal with an optional</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Unwrapping.swift</span></div>
      <pre><span class="tk-kw">var</span> name: <span class="tk-type">String</span>? = <span class="tk-str">"Ada"</span>

<span class="tk-fn">print</span>(name!)                          <span class="tk-com">// force unwrap — crashes if nil</span>
<span class="tk-kw">guard</span> <span class="tk-kw">let</span> n = name <span class="tk-kw">else</span> { <span class="tk-kw">return</span> }   <span class="tk-com">// guard let — exit early if nil</span>
<span class="tk-kw">let</span> greeting = <span class="tk-str">"Hi, "</span> + (name ?? <span class="tk-str">"stranger"</span>)  <span class="tk-com">// ?? nil-coalescing — fall back to a default</span>
<span class="tk-kw">let</span> upper = name?.uppercased()      <span class="tk-com">// optional chaining — nil short-circuits, no crash</span></pre></div>
      <h2>Pick a strategy, see how nil is handled</h2>
      <div class="lab" id="lab-opsio">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Unwrap strategy</span><span class="lab-hint">name: String?</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>name</label>
              <div class="seg" id="opsio-seg"><button data-v="value" class="active">"Ada"</button><button data-v="nil">nil</button></div>
            </div>
            <div class="ctl"><label>strategy</label>
              <div class="seg" id="opsio-strat">
                <button data-v="force" class="active">name!</button>
                <button data-v="guard">guard let</button>
                <button data-v="coalesce">name ?? "stranger"</button>
                <button data-v="chain">name?.uppercased()</button>
              </div>
            </div>
          </div>
          <div class="console" id="opsio-console"><span class="arrow">›</span><span class="info">press a strategy</span></div>
        </div>
      </div>
      <p>Only <code class="inline">name!</code> can crash. Every other strategy on this list was designed specifically so nil never reaches a runtime trap.</p>
    `
  },

  guardternary: {
    eyebrow:"Chapter 02 · Control Flow", title:"guard, Ternary & Loop Control",
    lede:"guard inverts an if check to bail out early when a condition fails. The ternary operator packs a tiny if/else into one expression. break and continue redirect a loop mid-flight.",
    body:`
      <h2>Bail early instead of nesting deep</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">GuardAndTernary.swift</span></div>
      <pre><span class="tk-kw">func</span> <span class="tk-fn">describe</span>(age: <span class="tk-type">Int</span>?) -&gt; <span class="tk-type">String</span> {
    <span class="tk-kw">guard</span> <span class="tk-kw">let</span> age, age &gt;= <span class="tk-num">0</span> <span class="tk-kw">else</span> { <span class="tk-kw">return</span> <span class="tk-str">"unknown"</span> }
    <span class="tk-kw">return</span> age &gt;= <span class="tk-num">18</span> ? <span class="tk-str">"adult"</span> : <span class="tk-str">"minor"</span>   <span class="tk-com">// ternary: condition ? a : b</span>
}

<span class="tk-kw">var</span> total = <span class="tk-num">0</span>
<span class="tk-kw">for</span> n <span class="tk-kw">in</span> <span class="tk-num">1</span>...<span class="tk-num">10</span> {
    <span class="tk-kw">if</span> n == <span class="tk-num">5</span> { <span class="tk-kw">continue</span> }   <span class="tk-com">// skip 5, keep going</span>
    <span class="tk-kw">if</span> n == <span class="tk-num">8</span> { <span class="tk-kw">break</span> }      <span class="tk-com">// stop entirely at 8</span>
    total += n
}</pre></div>
      <p>A <code class="inline">while</code> loop checks its condition before each pass; a <code class="inline">repeat-while</code> runs the body once <em>first</em>, then checks — useful when you always want at least one iteration.</p>
      <h2>Walk the loop and watch total accumulate</h2>
      <div class="lab" id="lab-guardternary">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">continue / break tracer</span><span class="lab-hint">1...10, skip 5, stop at 8</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="gt-run">run loop →</button></div>
          </div>
          <div class="tape" id="gt-tape"></div>
          <div class="console" id="gt-console"><span class="arrow">›</span><span class="info">total = 0</span></div>
        </div>
      </div>
    `
  },

  paramshof: {
    eyebrow:"Chapter 03 · Functions & Closures", title:"Parameters, Closures & Higher-Order Funcs",
    lede:"A parameter can have a different name for the caller than the one used inside the function, can have a default, can accept any number of values, and — with inout — can be modified in place by the function it's passed to.",
    body:`
      <h2>Naming, defaults, variadics, and inout</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Parameters.swift</span></div>
      <pre><span class="tk-kw">func</span> <span class="tk-fn">greet</span>(to name: <span class="tk-type">String</span>, loudly: <span class="tk-type">Bool</span> = <span class="tk-kw">false</span>) -&gt; <span class="tk-type">String</span> {
    <span class="tk-com">// caller writes "to:", body reads "name" — external vs internal name</span>
    loudly ? name.uppercased() : name
}
<span class="tk-fn">greet</span>(to: <span class="tk-str">"Ada"</span>)                 <span class="tk-com">// loudly defaults to false</span>

<span class="tk-kw">func</span> <span class="tk-fn">sum</span>(_ numbers: <span class="tk-type">Int</span>...) -&gt; <span class="tk-type">Int</span> { numbers.reduce(<span class="tk-num">0</span>, +) }  <span class="tk-com">// variadic</span>
<span class="tk-fn">sum</span>(<span class="tk-num">1</span>, <span class="tk-num">2</span>, <span class="tk-num">3</span>, <span class="tk-num">4</span>)

<span class="tk-kw">func</span> <span class="tk-fn">double</span>(_ x: <span class="tk-kw">inout</span> <span class="tk-type">Int</span>) { x *= <span class="tk-num">2</span> }   <span class="tk-com">// modifies the caller's variable</span>
<span class="tk-kw">var</span> score = <span class="tk-num">5</span>
<span class="tk-fn">double</span>(&score)                     <span class="tk-com">// score is now 10</span>

<span class="tk-kw">func</span> <span class="tk-fn">apply</span>(_ x: <span class="tk-type">Int</span>, _ transform: (<span class="tk-type">Int</span>) -&gt; <span class="tk-type">Int</span>) -&gt; <span class="tk-type">Int</span> {
    <span class="tk-kw">func</span> <span class="tk-fn">log</span>(_ v: <span class="tk-type">Int</span>) { <span class="tk-fn">print</span>(<span class="tk-str">"got \\(v)"</span>) }   <span class="tk-com">// nested function, private to apply</span>
    <span class="tk-fn">log</span>(x)
    <span class="tk-kw">return</span> transform(x)              <span class="tk-com">// transform: a closure passed in — higher-order</span>
}
<span class="tk-fn">apply</span>(<span class="tk-num">4</span>) { $0 * $0 }              <span class="tk-com">// trailing closure shorthand</span></pre></div>
      <h2>Mutate a variable through inout</h2>
      <div class="lab" id="lab-paramshof">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">inout in action</span><span class="lab-hint">double(&score)</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>score</label><input type="number" id="hof-score" value="5" style="width:90px;" /></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="hof-run">double(&score) →</button></div>
          </div>
          <div class="console" id="hof-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>Without <code class="inline">inout</code>, <code class="inline">double</code> would only get a copy and the caller's <code class="inline">score</code> would never change — <code class="inline">&score</code> is what lets the function reach back and modify the original.</p>
    `
  },

  propsmethods: {
    eyebrow:"Chapter 05 · Structs, Classes & Protocols", title:"Properties, Methods & Initializers",
    lede:"A stored property holds a value directly. A computed property recalculates its value from other state every time it's read. An initializer's job is to make sure every stored property has a value before the instance is used.",
    body:`
      <h2>Stored, computed, and the init that ties them together</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Rectangle.swift</span></div>

    <span class="tk-kw">var</span> height: <span class="tk-type">Double</span>     <span class="tk-com">// stored</span>

    <span class="tk-kw">var</span> area: <span class="tk-type">Double</span> { width * height }   <span class="tk-com">// computed — recalculated on every read</span>

    <span class="tk-kw">init</span>(width: <span class="tk-type">Double</span>, height: <span class="tk-type">Double</span>) {
        <span class="tk-kw">self</span>.width = width
        <span class="tk-kw">self</span>.height = height
    }

    <span class="tk-kw">func</span> <span class="tk-fn">scaled</span>(by factor: <span class="tk-type">Double</span>) -&gt; <span class="tk-type">Rectangle</span> {
        <span class="tk-type">Rectangle</span>(width: width * factor, height: height * factor)
    }
}</pre></div>
