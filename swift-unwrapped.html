  enumadvanced: {
    eyebrow:"Chapter 06 · Enumerations", title:"Raw & Associated Values",
    lede:"A raw value gives every case a fixed underlying value, fixed at compile time. An associated value lets each case carry its own unique data, attached fresh at the moment that case is created.",
    body:`
      <h2>Two different ways for a case to carry data</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">RawAndAssociated.swift</span></div>
      <pre><span class="tk-kw">enum</span> <span class="tk-type">StatusCode</span>: <span class="tk-type">Int</span> { <span class="tk-kw">case</span> ok = <span class="tk-num">200</span>, notFound = <span class="tk-num">404</span> }
<span class="tk-type">StatusCode</span>.ok.rawValue          <span class="tk-com">// 200, fixed by the enum itself</span>

<span class="tk-kw">enum</span> <span class="tk-type">NetworkResult</span> {
    <span class="tk-kw">case</span> success(<span class="tk-type">String</span>)
    <span class="tk-kw">case</span> failure(code: <span class="tk-type">Int</span>, message: <span class="tk-type">String</span>)
}

<span class="tk-kw">let</span> result = <span class="tk-type">NetworkResult</span>.failure(code: <span class="tk-num">404</span>, message: <span class="tk-str">"Not Found"</span>)
<span class="tk-kw">switch</span> result {
<span class="tk-kw">case</span> .success(<span class="tk-kw">let</span> body): <span class="tk-fn">print</span>(body)
<span class="tk-kw">case</span> .failure(<span class="tk-kw">let</span> code, <span class="tk-kw">let</span> msg): <span class="tk-fn">print</span>(<span class="tk-str">"\\(code): \\(msg)"</span>)
}

<span class="tk-kw">indirect</span> <span class="tk-kw">enum</span> <span class="tk-type">Expr</span> {                 <span class="tk-com">// recursive — refers to itself</span>
    <span class="tk-kw">case</span> number(<span class="tk-type">Int</span>)
    <span class="tk-kw">case</span> add(<span class="tk-type">Expr</span>, <span class="tk-type">Expr</span>)
}</pre></div>
      <h2>Match a NetworkResult and pull out its payload</h2>
      <div class="lab" id="lab-enumadvanced">

  taskgroups: {
    eyebrow:"Chapter 07 · Concurrency", title:"Task Groups, MainActor & Async Sequences",
    lede:"A single await runs one async operation. A task group runs many at once and waits for all of them — structured so the whole group is cancelled together if you walk away from it.",
    body:`
      <h2>Fan out, then collect every result</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">TaskGroups.swift</span></div>
      <pre><span class="tk-kw">let</span> images = <span class="tk-kw">await</span> <span class="tk-kw">withTaskGroup</span>(of: <span class="tk-type">UIImage</span>.<span class="tk-kw">self</span>) { group <span class="tk-kw">in</span>
    <span class="tk-kw">for</span> url <span class="tk-kw">in</span> urls {
        group.addTask { <span class="tk-kw">await</span> <span class="tk-fn">download</span>(url) }   <span class="tk-com">// all run concurrently</span>
    }
    <span class="tk-kw">var</span> results: [<span class="tk-type">UIImage</span>] = []
    <span class="tk-kw">for</span> <span class="tk-kw">await</span> image <span class="tk-kw">in</span> group { results.append(image) }
    <span class="tk-kw">return</span> results
}

<span class="tk-kw">@MainActor</span>
<span class="tk-kw">func</span> <span class="tk-fn">updateUI</span>(with image: <span class="tk-type">UIImage</span>) { imageView.image = image }  <span class="tk-com">// always runs on the main thread</span>

<span class="tk-kw">for</span> <span class="tk-kw">try</span> <span class="tk-kw">await</span> line <span class="tk-kw">in</span> url.lines {           <span class="tk-com">// AsyncSequence — values arrive over time</span>
    <span class="tk-fn">print</span>(line)
}</pre></div>

    lede:"A Coordinator pulls navigation logic out of view controllers, so a screen doesn't need to know what comes after it. Dependency injection hands a type its dependencies from outside, rather than letting it reach out and grab them.",
    body:`
      <h2>Who decides what's next, and who hands you your tools</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">CoordinatorAndDI.swift</span></div>

<span class="tk-kw">class</span> <span class="tk-type">LoginCoordinator</span>: <span class="tk-type">Coordinator</span> {
    <span class="tk-kw">func</span> <span class="tk-fn">start</span>() { <span class="tk-com">/* push LoginVC, decide what's next on success */</span> }
}

<span class="tk-com">// Dependency injection: the service is passed in, not created internally</span>
<span class="tk-kw">class</span> <span class="tk-type">ProfileViewModel</span> {
    <span class="tk-kw">let</span> api: <span class="tk-type">APIClientProtocol</span>
    <span class="tk-kw">init</span>(api: <span class="tk-type">APIClientProtocol</span>) { <span class="tk-kw">self</span>.api = api }   <span class="tk-com">// a fake api can be injected in tests</span>
}</pre></div>
      <h2>Swap a real dependency for a fake one</h2>
      <div class="lab" id="lab-coordinatordi">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Injected dependency</span><span class="lab-hint">ProfileViewModel(api:)</span></div>

          <div class="lab-controls">
            <div class="ctl"><label>injected api</label>

      <h2>Why string[3] doesn't compile</h2>

<span class="tk-kw">let</span> greeting = <span class="tk-str">"Hello, \\(name)!"</span>          <span class="tk-com">// interpolation</span>

<span class="tk-kw">let</span> idx = greeting.index(greeting.startIndex, offsetBy: <span class="tk-num">7</span>)
greeting[idx]                                <span class="tk-com">// 'A' — String.Index, not Int</span>

<span class="tk-kw">let</span> word: <span class="tk-type">Substring</span> = greeting.dropFirst(<span class="tk-num">7</span>).dropLast()  <span class="tk-com">// shares storage with greeting</span>

<span class="tk-kw">if</span> <span class="tk-kw">let</span> match = greeting.firstMatch(of: <span class="tk-kw">/[A-Z][a-z]+/</span>) {
    <span class="tk-fn">print</span>(match.<span class="tk-num">0</span>)                            <span class="tk-com">// Swift Regex literal</span>
}</pre></div>
      <h2>Find where a substring starts</h2>
      <div class="lab" id="lab-stringsdeep">

    lede:"These eight methods cover almost every transformation you'll ever do to a collection — each one takes a closure and returns a new collection or value, leaving the original untouched.",
    body:`
      <h2>The functional toolkit, in one place</h2>

nums.filter { $0 % <span class="tk-num">2</span> == <span class="tk-num">0</span> }                 <span class="tk-com">// [2, 4]</span>
nums.reduce(<span class="tk-num">0</span>, +)                        <span class="tk-com">// 15</span>
nums.forEach { <span class="tk-fn">print</span>($0) }                  <span class="tk-com">// side effect, no return value</span>
nums.sorted(by: &gt;)                       <span class="tk-com">// [5, 4, 3, 2, 1]</span>

<span class="tk-kw">let</span> raw = [<span class="tk-str">"1"</span>, <span class="tk-str">"two"</span>, <span class="tk-str">"3"</span>]
raw.compactMap { <span class="tk-type">Int</span>($0) }                  <span class="tk-com">// [1, 3] — nils dropped</span>

<span class="tk-kw">let</span> nested = [[<span class="tk-num">1</span>,<span class="tk-num">2</span>], [<span class="tk-num">3</span>,<span class="tk-num">4</span>]]
nested.flatMap { $0 }                     <span class="tk-com">// [1, 2, 3, 4] — one flat array</span>

<span class="tk-fn">zip</span>([<span class="tk-str">"a"</span>,<span class="tk-str">"b"</span>], [<span class="tk-num">1</span>,<span class="tk-num">2</span>]).map { <span class="tk-str">"\\($0)\\($1)"</span> }   <span class="tk-com">// ["a1", "b2"]</span></pre></div>

        </div>
      </div>
    `

  inheritance: {
    eyebrow:"Chapter 15 · Object-Oriented Programming", title:"Inheritance, Polymorphism & Static Members",
    lede:"A subclass inherits everything its superclass has and can override specific behavior. Calling that overridden method through a superclass-typed reference is polymorphism — the right version still runs.",
    body:`
      <h2>One call, the subclass's version runs</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Inheritance.swift</span></div>
      <pre><span class="tk-kw">class</span> <span class="tk-type">Animal</span> {
    <span class="tk-kw">static</span> <span class="tk-kw">let</span> kingdom = <span class="tk-str">"Animalia"</span>   <span class="tk-com">// one copy, shared by every instance and subclass</span>
    <span class="tk-kw">func</span> <span class="tk-fn">speak</span>() -&gt; <span class="tk-type">String</span> { <span class="tk-str">"..."</span> }
}
<span class="tk-kw">final</span> <span class="tk-kw">class</span> <span class="tk-type">Dog</span>: <span class="tk-type">Animal</span> {              <span class="tk-com">// final: nothing can subclass Dog</span>
    <span class="tk-kw">override</span> <span class="tk-kw">func</span> <span class="tk-fn">speak</span>() -&gt; <span class="tk-type">String</span> { <span class="tk-str">"Woof!"</span> }
}

<span class="tk-kw">let</span> animals: [<span class="tk-type">Animal</span>] = [<span class="tk-type">Animal</span>(), <span class="tk-type">Dog</span>()]
<span class="tk-kw">for</span> a <span class="tk-kw">in</span> animals { <span class="tk-fn">print</span>(a.speak()) }   <span class="tk-com">// "...", then "Woof!" — polymorphism</span></pre></div>
      <h2>Call speak() through the Animal-typed reference</h2>
      <div class="lab" id="lab-inheritance">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Polymorphic dispatch</span><span class="lab-hint">the static type is Animal either way</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>Runtime type</label>
              <div class="seg" id="inh-seg"><button data-v="Animal" class="active">Animal()</button><button data-v="Dog">Dog()</button></div>
            </div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="inh-run">a.speak() →</button></div>
          </div>
          <div class="console" id="inh-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
      <p>Swift picks which <code class="inline">speak()</code> to run based on the object's actual runtime type, never the type the variable was declared with — that's what makes the loop above print two different lines.</p>

  propflow: {
    eyebrow:"Chapter 16 · Property Features & Advanced Flow", title:"Observers, Lazy, defer & Pattern Matching",
    lede:"A property observer reacts the instant a value changes. lazy delays creation until first use. defer guarantees cleanup code runs no matter how a scope exits. where adds an extra condition onto a pattern.",
    body:`
      <h2>Four small mechanics, each solving one specific problem</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">PropFlow.swift</span></div>
      <pre><span class="tk-kw">class</span> <span class="tk-type">Account</span> {
    <span class="tk-kw">var</span> balance = <span class="tk-num">0</span> {
        didSet { <span class="tk-fn">print</span>(<span class="tk-str">"changed from \\(oldValue) to \\(balance)"</span>) }   <span class="tk-com">// property observer</span>
    }
    <span class="tk-kw">lazy</span> <span class="tk-kw">var</span> formatter = <span class="tk-type">NumberFormatter</span>()   <span class="tk-com">// built only on first access</span>
}

<span class="tk-kw">func</span> <span class="tk-fn">process</span>() {
    <span class="tk-fn">print</span>(<span class="tk-str">"start"</span>)
    <span class="tk-kw">defer</span> { <span class="tk-fn">print</span>(<span class="tk-str">"cleanup — always runs"</span>) }   <span class="tk-com">// runs at scope exit, even after a throw</span>
    <span class="tk-fn">print</span>(<span class="tk-str">"work"</span>)
}

<span class="tk-kw">for</span> case <span class="tk-kw">let</span> n <span class="tk-kw">in</span> [<span class="tk-num">1</span>,<span class="tk-num">2</span>,<span class="tk-num">3</span>,<span class="tk-num">4</span>] <span class="tk-kw">where</span> n % <span class="tk-num">2</span> == <span class="tk-num">0</span> { <span class="tk-fn">print</span>(n) }  <span class="tk-com">// where narrows the match</span>

<span class="tk-kw">if</span> <span class="tk-kw">#available</span>(iOS <span class="tk-num">17</span>, *) { <span class="tk-fn">useNewAPI</span>() } <span class="tk-kw">else</span> { <span class="tk-fn">useOldAPI</span>() }</pre></div>
      <h2>Run process() and watch the order defer prints in</h2>
      <div class="lab" id="lab-propflow">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">defer ordering</span><span class="lab-hint">defer always runs last, regardless of where it's written</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="pf-run">process() →</button></div>
          </div>
          <div class="tape" id="pf-tape"></div>
        </div>
      </div>
      <p>Notice <code class="inline">defer</code> is written in the middle of the function but its message always prints last — it's tied to when the scope exits, not to its position in the source.</p>
    `
  },

    lede:"URLSession fetches raw data over the network; Codable turns that raw JSON into a typed Swift struct in one call. Once you have a value, UserDefaults, FileManager, Keychain, and SwiftData each store it somewhere different, for different reasons.",

<span class="tk-kw">let</span> (data, response) = <span class="tk-kw">try</span> <span class="tk-kw">await</span> <span class="tk-type">URLSession</span>.shared.<span class="tk-fn">data</span>(from: url)

  testingspm: {
    eyebrow:"Chapter 18 · Testing & Tooling", title:"XCTest & Swift Package Manager",
    lede:"XCTest is how Swift code proves it does what you think it does. Swift Package Manager is how that code — and its dependencies — gets organized, built, and shared as a reusable module.",
    body:`
      <h2>Asserting expected behavior</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">CalculatorTests.swift</span></div>
      <pre><span class="tk-kw">final</span> <span class="tk-kw">class</span> <span class="tk-type">CalculatorTests</span>: <span class="tk-type">XCTestCase</span> {
    <span class="tk-kw">func</span> <span class="tk-fn">testAddition</span>() {
        <span class="tk-kw">let</span> result = <span class="tk-type">Calculator</span>().add(<span class="tk-num">2</span>, <span class="tk-num">3</span>)
        <span class="tk-type">XCTAssertEqual</span>(result, <span class="tk-num">5</span>)
    }
    <span class="tk-kw">func</span> <span class="tk-fn">testDivideByZeroThrows</span>() {
        <span class="tk-type">XCTAssertThrowsError</span>(<span class="tk-kw">try</span> <span class="tk-type">Calculator</span>().divide(<span class="tk-num">1</span>, by: <span class="tk-num">0</span>))
    }
}</pre></div>
      <p>A mock conforming to the same protocol as the real dependency — like in the Dependency Injection lesson — is what makes a unit test fast and deterministic instead of hitting a real network.</p>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">UITests.swift</span></div>
      <pre><span class="tk-kw">final</span> <span class="tk-kw">class</span> <span class="tk-type">LoginUITests</span>: <span class="tk-type">XCTestCase</span> {
    <span class="tk-kw">func</span> <span class="tk-fn">testLoginButtonAppears</span>() {
        <span class="tk-kw">let</span> app = <span class="tk-type">XCUIApplication</span>()
        app.<span class="tk-fn">launch</span>()
        <span class="tk-type">XCTAssertTrue</span>(app.buttons[<span class="tk-str">"Log In"</span>].exists)   <span class="tk-com">// drives the real UI, not just the logic</span>
    }
}</pre></div>
      <p>Unit tests call your code directly; <code class="inline">XCUIApplication</code> instead launches and taps through the actual running app, which is slower but catches problems unit tests can't — a button that's misspelled, missing, or unreachable.</p>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">Package.swift</span></div>
      <pre><span class="tk-kw">let</span> package = <span class="tk-type">Package</span>(
    name: <span class="tk-str">"NetworkKit"</span>,
    products: [.library(name: <span class="tk-str">"NetworkKit"</span>, targets: [<span class="tk-str">"NetworkKit"</span>])],
    dependencies: [.package(url: <span class="tk-str">"https://github.com/apple/swift-log"</span>, from: <span class="tk-str">"1.0.0"</span>)],
    targets: [.target(name: <span class="tk-str">"NetworkKit"</span>, dependencies: [.product(name: <span class="tk-str">"Logging"</span>, package: <span class="tk-str">"swift-log"</span>)])]
)</pre></div>
      <h2>Run a test against good and bad input</h2>
      <div class="lab" id="lab-testingspm">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">XCTAssert outcomes</span><span class="lab-hint">Calculator().divide(1, by: …)</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>divisor</label><input type="number" id="ts-div" value="0" style="width:80px;" /></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="ts-run">XCTAssertThrowsError →</button></div>
          </div>
          <div class="console" id="ts-console"><span class="arrow">›</span><span class="info">press run</span></div>
        </div>
      </div>
    `
  },

      <h2>some vs. any, and reaching into a property by reference</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">AdvancedSwift.swift</span></div>
      <pre><span class="tk-kw">func</span> <span class="tk-fn">makeView</span>() -&gt; <span class="tk-kw">some</span> <span class="tk-type">View</span> { <span class="tk-type">Text</span>(<span class="tk-str">"Hi"</span>) }     <span class="tk-com">// one fixed concrete type, known at compile time</span>
<span class="tk-kw">let</span> shapes: [<span class="tk-kw">any</span> <span class="tk-type">Shape</span>] = [<span class="tk-type">Circle</span>(), <span class="tk-type">Square</span>()]   <span class="tk-com">// any: a box that can hold any conformer</span>

<span class="tk-kw">struct</span> <span class="tk-type">Person</span> { <span class="tk-kw">var</span> name: <span class="tk-type">String</span> }
<span class="tk-kw">let</span> nameKP = \\<span class="tk-type">Person</span>.name              <span class="tk-com">// a KeyPath, not a call</span>
<span class="tk-kw">let</span> people = [<span class="tk-type">Person</span>(name: <span class="tk-str">"Ada"</span>), <span class="tk-type">Person</span>(name: <span class="tk-str">"Grace"</span>)]
people.map(\\.name)                          <span class="tk-com">// ["Ada", "Grace"] — KeyPath as a function</span>

<span class="tk-kw">@Observable</span> <span class="tk-com">// a macro — expands into observation boilerplate at compile time</span>
<span class="tk-kw">class</span> <span class="tk-type">Settings</span> { <span class="tk-kw">var</span> darkMode = <span class="tk-kw">false</span> }

<span class="tk-type">Mirror</span>(reflecting: people[<span class="tk-num">0</span>]).children.forEach { <span class="tk-fn">print</span>($0.label ?? <span class="tk-str">"?"</span>) }  <span class="tk-com">// reflection</span></pre></div>
      <p>Unsafe pointers and <code class="inline">@objc</code> bridging exist for the same reason: sometimes Swift needs to talk directly to C memory or an Objective-C runtime that doesn't know about Swift's safety guarantees at all. <code class="inline">@dynamicMemberLookup</code> sits at the opposite end — a type can intercept <code class="inline">.anyPropertyName</code> at compile time and resolve it dynamically, which is how some JSON wrappers let you write <code class="inline">json.user.name</code> without declaring <code class="inline">user</code> or <code class="inline">name</code> anywhere.</p>
      <h2>Pull a value out with a key path</h2>
      <div class="lab" id="lab-advancedgrab">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">KeyPath lookup</span><span class="lab-hint">people.map(\\.____)</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>KeyPath</label>
              <div class="seg" id="ag-seg"><button data-v="name" class="active">\\.name</button><button data-v="count">\\.name.count</button></div>
            </div>
          </div>
          <div class="console" id="ag-console"><span class="arrow">›</span><span class="info">pick a key path</span></div>
        </div>
      </div>
    `
  },

  resultbuilderbasics: {
    eyebrow:"Chapter 21 · Result Builders", title:"@resultBuilder & SwiftUI's DSL",
    lede:"A result builder lets you write a sequence of expressions as if they were a list, and it quietly stitches them together behind the scenes. It's the mechanism that makes SwiftUI's body { } read like markup instead of a wall of function calls.",
    body:`
      <h2>What body { ... } actually compiles into</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">ResultBuilder.swift</span></div>
      <pre><span class="tk-kw">@resultBuilder</span>
<span class="tk-kw">struct</span> <span class="tk-type">StringBuilder</span> {
    <span class="tk-kw">static</span> <span class="tk-kw">func</span> <span class="tk-fn">buildBlock</span>(_ parts: <span class="tk-type">String</span>...) -&gt; <span class="tk-type">String</span> {
        parts.joined(separator: <span class="tk-str">"\\n"</span>)
    }
}

<span class="tk-kw">@StringBuilder</span>
<span class="tk-kw">func</span> <span class="tk-fn">card</span>(name: <span class="tk-type">String</span>) -&gt; <span class="tk-type">String</span> {
    <span class="tk-str">"Name: \\(name)"</span>
    <span class="tk-str">"Status: active"</span>     <span class="tk-com">// each line is a separate expression, joined by buildBlock</span>
}</pre></div>
      <p>SwiftUI's <code class="inline">@ViewBuilder</code> works the same way: every line inside <code class="inline">body</code> is one expression, and the builder's <code class="inline">buildBlock</code> assembles them all into a single view tree — that's the entire trick behind <code class="inline">VStack { Text("Hi"); Text("Bye") }</code> not needing commas or an array.</p>
      <h2>Add lines, watch the builder join them</h2>
      <div class="lab" id="lab-resultbuilderbasics">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">StringBuilder DSL</span><span class="lab-hint">each "line" is its own expression</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl"><label>line to add</label><input type="text" id="rb-line" value="Status: active" /></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="rb-add">add line →</button></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn secondary" id="rb-reset">reset</button></div>
          </div>
          <div class="console" id="rb-console" style="white-space:pre-line;"><span class="arrow">›</span><span class="info">Name: Ada</span></div>
        </div>
      </div>
      <p>Nothing here is special-cased by the compiler for SwiftUI specifically — <code class="inline">@resultBuilder</code> is a general feature, and SwiftUI is simply its most famous user.</p>
    `
  },

  performancebasics: {
    eyebrow:"Chapter 22 · Performance", title:"Value Semantics, COW & Profiling",
    lede:"Copying a struct sounds expensive, but Swift's standard collections fake the copy until someone actually writes to it — and Instruments is how you find out whether your real bottleneck is even where you assumed it was.",
    body:`
      <h2>Copy-on-write: a copy that doesn't happen yet</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">COW.swift</span></div>
      <pre><span class="tk-kw">var</span> a = [<span class="tk-num">1</span>, <span class="tk-num">2</span>, <span class="tk-num">3</span>]
<span class="tk-kw">var</span> b = a            <span class="tk-com">// no copy yet — both point at the same buffer</span>
b.append(<span class="tk-num">4</span>)         <span class="tk-com">// NOW a real copy happens, because b is about to diverge from a</span>
<span class="tk-com">// a == [1, 2, 3], b == [1, 2, 3, 4]</span></pre></div>
      <p>Arrays, dictionaries, and sets are structs with value semantics, but their actual storage is a class underneath. Assignment just bumps a reference count; the expensive element-by-element copy is deferred until a mutation would otherwise affect two "different" values at once.</p>
      <h2>When laziness pays off</h2>
      <div class="codeblock"><div class="cb-head"><span class="dot2 r"></span><span class="dot2 y"></span><span class="dot2 g"></span><span class="fname">LazySequence.swift</span></div>
      <pre><span class="tk-kw">let</span> result = (<span class="tk-num">1</span>...<span class="tk-num">1_000_000</span>)
    .lazy
    .map { $0 * <span class="tk-num">2</span> }
    .first { $0 &gt; <span class="tk-num">10</span> }   <span class="tk-com">// stops after a handful of elements — map never touches the rest</span></pre></div>
      <p>Without <code class="inline">.lazy</code>, <code class="inline">map</code> would eagerly transform all one million elements before <code class="inline">first</code> ever looked at one. With it, each element is only mapped right before it's checked, and the chain stops the instant a match is found.</p>
      <h2>Mutate a shared array, watch when the copy actually fires</h2>
      <div class="lab" id="lab-performancebasics">
        <div class="lab-head"><span class="ic">▣</span><span class="lab-title">Copy-on-write tracer</span><span class="lab-hint">var b = a; then mutate b</span></div>
        <div class="lab-body">
          <div class="lab-controls">
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="cow-assign">var b = a →</button></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn" id="cow-mutate">b.append(4) →</button></div>
            <div class="ctl" style="justify-content:flex-end;"><button class="btn secondary" id="cow-reset">reset</button></div>
          </div>
          <div class="two-col">
            <div class="box-card"><h4>storage buffers</h4><div class="val" id="cow-buffers" style="font-size:14px;">1 buffer, shared by a &amp; b</div></div>
            <div class="box-card"><h4>a / b</h4><div class="val" id="cow-vals" style="font-size:14px;">[1,2,3] / [1,2,3]</div></div>
          </div>
          <div class="console" id="cow-console" style="margin-top:12px;"><span class="arrow">›</span><span class="info">press a button</span></div>
        </div>
      </div>
      <p>The assignment itself never copies anything — only the first mutation after sharing began does. Instruments' Time Profiler and Allocations tools are how you'd confirm this in a real app: a spike in retain/release traffic or unexpected buffer allocations right at a mutation, not at the assignment before it.</p>
    `
  },
};

    const console_ = document.getElementById("dm-console");
    const render = (mode)=>{
      let filtered = books;
      if(mode === "unread") filtered = books.filter(b=>!b.isRead);
      if(mode === "short") filtered = books.filter(b=>b.pageCount < 300);
      tape.innerHTML = "";
      filtered.forEach(b=>{
        const c = document.createElement("div");
        c.className = "cell";
        c.textContent = b.title;
        tape.appendChild(c);
      });
      console_.innerHTML = `<span class="arrow">›</span><span class="ok">${filtered.length} result${filtered.length===1?"":"s"}</span>`;
    };

    render("all");

  savingrels(){
    let dirty = false;
    let saved = 0;
    const render = (msg)=>{
      document.getElementById("sr-state").textContent = dirty ? "dirty" : "clean";
      document.getElementById("sr-state").style.color = dirty ? "var(--rose)" : "var(--mint)";
      document.getElementById("sr-count").textContent = saved;
      if(msg) document.getElementById("sr-console").innerHTML = `<span class="arrow">›</span>${msg}`;
    };
    document.getElementById("sr-insert").addEventListener("click", ()=>{
      const title = (document.getElementById("sr-title").value || "Untitled").replace(/</g,"&lt;");
      dirty = true;
      render(`<span class="info">Book(context:) inserted "${title}" — not yet saved</span>`);
    });
    document.getElementById("sr-save").addEventListener("click", ()=>{
      if(!dirty){ render(`<span class="info">context.hasChanges == false — nothing to save</span>`); return; }
      saved++; dirty = false;
      render(`<span class="ok">context.save() — row persisted to disk</span>`);
    });
    render();
  },

  solid(){

      L: `<b>Liskov Substitution</b> — can a subtype stand in for its supertype with no surprises? A <code class="inline">Square</code> that throws when you set width ≠ height breaks this.`,
      I: `<b>Interface Segregation</b> — are protocols small and specific, or one bloated protocol forcing types to implement methods they don't need?`,
      D: `<b>Dependency Inversion</b> — does your code depend on a protocol, or on a concrete <code class="inline">URLSession</code>? Depending on the abstraction is what makes mocking in tests possible.`,
    };
    setSeg("solid-seg", v=>{
      document.getElementById("solid-console").innerHTML = text[v];

  arc(){
    let weakTenant = true;
    setSeg("arc-seg", v=>weakTenant = v==="weak");
    const reset = ()=>{
      document.getElementById("arc-person").textContent = "alive (refs: 1)";
      document.getElementById("arc-person").style.color = "var(--text)";
      document.getElementById("arc-apt").textContent = "alive (refs: 1)";
      document.getElementById("arc-apt").style.color = "var(--text)";
      document.getElementById("arc-console").innerHTML = `<span class="arrow">›</span><span class="info">press run</span>`;
    };
    document.getElementById("arc-run").addEventListener("click", ()=>{
      const personEl = document.getElementById("arc-person");
      const aptEl = document.getElementById("arc-apt");
      if(weakTenant){
        personEl.textContent = "deallocated (refs: 0)";
        personEl.style.color = "var(--mint)";
        aptEl.textContent = "deallocated (refs: 0)";
        aptEl.style.color = "var(--mint)";
        document.getElementById("arc-console").innerHTML = `<span class="arrow">›</span><span class="ok">both refcounts hit 0 — both deallocated</span>`;
      } else {
        personEl.textContent = "leaked (refs: 1, held by Apartment)";
        personEl.style.color = "var(--rose)";
        aptEl.textContent = "leaked (refs: 1, held by Person)";
        aptEl.style.color = "var(--rose)";
        document.getElementById("arc-console").innerHTML = `<span class="arrow">›</span><span class="err">strong reference cycle — neither refcount reaches 0</span>`;

  errorhandling(){
    let form = "try";
    setSeg("eh-seg", v=>form=v);
    document.getElementById("eh-run").addEventListener("click", ()=>{
      const raw = document.getElementById("eh-input").value;
      const console_ = document.getElementById("eh-console");
      let error = null;
      if(raw === "") error = "ParseError.empty";
      else if(isNaN(parseInt(raw,10)) || !/^-?\d+$/.test(raw)) error = "ParseError.malformed";
      if(form === "try"){
        console_.innerHTML = error
          ? `<span class="arrow">›</span><span class="err">catch ${error}</span> <span class="pill rose">must be wrapped in do/catch</span>`
          : `<span class="arrow">›</span><span class="ok">${parseInt(raw,10)}</span>`;
      } else if(form === "tryq"){
        console_.innerHTML = error
          ? `<span class="arrow">›</span><span class="info">nil</span> <span class="pill mint">error discarded</span>`
          : `<span class="arrow">›</span><span class="ok">Optional(${parseInt(raw,10)})</span>`;
      } else {
        console_.innerHTML = error
          ? `<span class="arrow">›</span><span class="err">Fatal error: 'try!' expression unexpectedly raised an error — ${error}</span>`
          : `<span class="arrow">›</span><span class="ok">${parseInt(raw,10)}</span>`;
      }
    });
  },

  opsio(){

    const buttons = document.querySelectorAll("#opsio-seg button, #opsio-strat button");

      const console_ = document.getElementById("opsio-console");
      const isNil = hasValue === "nil";
      if(strat === "force"){
        console_.innerHTML = isNil
          ? `<span class="arrow">›</span><span class="err">Fatal error: Unexpectedly found nil while unwrapping an Optional value</span>`
          : `<span class="arrow">›</span><span class="ok">"Ada"</span>`;
      } else if(strat === "guard"){
        console_.innerHTML = isNil
          ? `<span class="arrow">›</span><span class="err">guard fails → return (function exits early, no crash)</span>`
          : `<span class="arrow">›</span><span class="ok">n == "Ada" — continues past the guard</span>`;
      } else if(strat === "coalesce"){
        console_.innerHTML = isNil
          ? `<span class="arrow">›</span><span class="ok">"Hi, stranger"</span>`
          : `<span class="arrow">›</span><span class="ok">"Hi, Ada"</span>`;
      } else {
        console_.innerHTML = isNil
          ? `<span class="arrow">›</span><span class="info">nil</span> <span class="pill mint">short-circuited, no crash</span>`
          : `<span class="arrow">›</span><span class="ok">Optional("ADA")</span>`;
      }
    };
    buttons.forEach(b=>b.addEventListener("click", update));
    update();

  guardternary(){
    document.getElementById("gt-run").addEventListener("click", ()=>{
      const tape = document.getElementById("gt-tape");
      const console_ = document.getElementById("gt-console");
      tape.innerHTML = "";
      let total = 0;
      for(let n=1;n<=10;n++){
        const c = document.createElement("div");
        c.className = "cell";
        if(n === 5){
          c.textContent = `${n} (continue)`;
          tape.appendChild(c);
          continue;
        }
        if(n === 8){
          c.textContent = `${n} (break)`;
          c.classList.add("hit");
          tape.appendChild(c);
          break;
        }
        c.textContent = String(n);
        c.classList.add("hit");
        tape.appendChild(c);
        total += n;
      }
      console_.innerHTML = `<span class="arrow">›</span><span class="ok">total = ${total}</span>`;
    });
  },

  taskgroups(){
    document.getElementById("tg-run").addEventListener("click", ()=>{
      const tape = document.getElementById("tg-tape");
      const console_ = document.getElementById("tg-console");
      tape.innerHTML = "";
      console_.innerHTML = `<span class="arrow">›</span><span class="info">3 tasks started concurrently…</span>`;
      const cells = [1,2,3].map(i=>{
        const c = document.createElement("div");
        c.className = "cell";
        c.textContent = `task ${i}: pending`;
        tape.appendChild(c);
        return c;
      });
      const order = [0,1,2].sort(()=>Math.random()-0.5);
      let done = 0;
      order.forEach((idx, j)=>{
        setTimeout(()=>{
          cells[idx].textContent = `task ${idx+1}: done`;
          cells[idx].classList.add("hit");
          done++;
          if(done === 3){
            console_.innerHTML = `<span class="arrow">›</span><span class="ok">all 3 collected — order: ${order.map(o=>o+1).join(", ")}</span>`;
          }
        }, 200 + j*300 + Math.random()*200);
      });
    });
  },

  performancebasics(){
    let shared = true;
    const render = (msg)=>{
      document.getElementById("cow-buffers").textContent = shared ? "1 buffer, shared by a & b" : "2 buffers — copy occurred";
      document.getElementById("cow-vals").textContent = shared ? "[1,2,3] / [1,2,3]" : "[1,2,3] / [1,2,3,4]";
      if(msg) document.getElementById("cow-console").innerHTML = `<span class="arrow">›</span>${msg}`;
    };
    document.getElementById("cow-assign").addEventListener("click", ()=>{
      shared = true;
      render(`<span class="info">var b = a — refcount bumped, no copy yet</span>`);
    });
    document.getElementById("cow-mutate").addEventListener("click", ()=>{
      if(!shared){ render(`<span class="info">already copied — mutating further is free</span>`); return; }
      shared = false;
      render(`<span class="ok">b.append(4) — refcount was &gt; 1, so the buffer was copied first</span>`);
    });
    document.getElementById("cow-reset").addEventListener("click", ()=>{
      shared = true;
      render(`<span class="info">reset</span>`);
    });
    render();
  },
